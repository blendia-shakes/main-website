<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F1E8" />
    <link rel="icon" type="image/png" href="/img-core/logos/icon.png" />
    <link rel="preload" as="image" href="/img-core/logos/text.webp" type="image/webp" />
    <link rel="preload" as="image" href="/img-core/logos/text-white.webp" type="image/webp" />
    <link rel="preload" as="font" href="/fonts/Geist-Variable.woff2" type="font/woff2" crossorigin />
    <link rel="preload" as="font" href="/fonts/GeistMono-Variable.woff2" type="font/woff2" crossorigin />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'light' || saved === 'dark') {
            document.documentElement.setAttribute('data-theme', saved);
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', saved === 'dark' ? '#403F45' : '#F5F1E8');
          }
        } catch (_) {}
      })();
    </script>

    <link rel="stylesheet" href="/src/styles.css" />
    <title>Blendia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
