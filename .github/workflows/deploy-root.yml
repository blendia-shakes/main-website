name: CI / Build & Deploy to root

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & build
        working-directory: ./site
        run: |
          npm ci
          npm run build

      - name: Detect build output
        run: |
          if [ -d "./dist" ]; then
            echo "BUILD_DIR=dist" >> $GITHUB_ENV
          elif [ -d "./site/dist" ]; then
            echo "BUILD_DIR=site/dist" >> $GITHUB_ENV
          else
            echo "No build directory found"
            exit 1
          fi

      - name: Copy build to root
        run: |
          echo "Using build directory: $BUILD_DIR"

          rm -rf ./assets || true
          rm -f ./index.html || true

          cp -r $BUILD_DIR/assets ./assets
          cp $BUILD_DIR/index.html ./index.html

      - name: Commit & push build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets index.html

          git commit -m "ci: update site build" || echo "No changes"

          git push