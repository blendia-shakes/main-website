name: CI / Build & Deploy to root (clean)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build
        working-directory: ./site
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: |
          if [ ! -d "./dist" ]; then
            echo "❌ dist not found"
            exit 1
          fi

          echo "✅ Build contents:"
          ls -la dist

      - name: Clean root (except git)
        run: |
          find . -mindepth 1 \
            ! -regex '^./\.git\(/.*\)?' \
            ! -name '.gitignore' \
            ! -name '.github' \
            -exec rm -rf {} +

      - name: Move dist to root
        run: |
          cp -r dist/* .

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "ci: deploy clean build" || echo "No changes"
          git push